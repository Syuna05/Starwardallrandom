<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星の翼オールランダム抽選システム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            color: white;
            position: relative; /* 親要素に相対位置を設定 */
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 背景を暗くする */
            z-index: -1; /* 背景に影響を与えず他の要素の下に配置 */
        }

        h1, p {
            color: white;  /* タイトルと説明文も白に */
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .item-group {
            display: flex;
            flex-direction: row;  /* 横並びにする */
            align-items: center;
            gap: 10px;
        }

        .item-group .cost-label {
            font-size: 29px; /* ここで文字サイズを大きく変更 */
            font-weight: bold;
            margin-right: 10px; /* コストラベルを横並びに */
        }

        .item {
            margin: 10px;
            text-align: center;
            cursor: pointer;
        }

        .item img {
            width: 90px; /* 画像のサイズを100pxに調整 */
            height: 70px; /* 画像のサイズを100pxに調整 */
            transition: filter 0.3s;
        }

        .item.selected img {
            filter: brightness(50%);
        }

        .item-name {
            font-size: 14px;
            margin-top: 5px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        #drawButton {
            background-color: #4CAF50;  /* 抽選ボタンを緑に変更 */
            color: white;
            font-size: 20px;  /* ボタンの文字サイズを少し大きく */
            padding: 15px 30px;  /* ボタンのパディングを大きく */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 0px; /* 他のボタンとの距離を広げる */
            margin-top: 50px; /* 上部の余白を少し追加 */
            margin-bottom: 20px; /* 下部に余白を追加して間隔を空ける */
        }

        #selectAllButton, #deselectAllButton {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px; /* 上部の余白を追加 */
        }

        #resultContainer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        #resultContainer img {
            width: 150px; /* 結果の画像も100pxに調整 */
            height: 100px;
        }

        .select-all-button {
            margin-top: 10px;
        }

        .result-item {
            text-align: center;
            margin: 10px;
        }

        .result-name, .result-rank {
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>星の翼ALLランダム抽選システム</h1>
    <p>所持キャラを選択して抽選を行ってください。※覚醒は自動で選択されます</p>

    <div class="container" id="itemContainer"></div>

    <div class="button-container">
        <button id="drawButton">抽選</button>
        <button id="selectAllButton" class="select-all-button">全選択</button> <!-- 全選択ボタン -->
        <button id="deselectAllButton" class="select-all-button">全解除</button> <!-- 全解除ボタン -->
    </div>

    <div id="resultContainer"></div>

    <script>
        window.onload = function () {
            const itemContainer = document.getElementById("itemContainer");

            // アイテムの名前と画像番号
            const imageNames = [
                "グリフィン", "スズラン", "影", "キャヴァリー", "ラジエル", 
                "エルフィン", "シュウウ", "ヒカリ", "ケルビム", 
                "シャープ", "スカイセーバー", "シャオリン", "18号", "アンジェリス", 
                "フリード", "シグナス", "アリス", "カゼ", "アイーダ", 
                "ヴァーチェ", "セラフィム", "スコーピオン", "パラス", "ベータ", 
                "エミカ", "デュカリオン", "チンニ", "ザハロワ", "ダークスター", 
                "ローランド", "スノーウォル", "ヤミン", "カタリナ", "オーキッド"
            ];

            // コスト設定
            const costs = ["30コス", "25コス", "20コス", "15コス"];
            const costRanges = {
                30: 9,  // 30コスのアイテム数
                25: 9,  // 25コスのアイテム数
                20: 11, // 20コスのアイテム数（修正）
                15: 5   // 15コスのアイテム数（修正）
            };

            // 画像28と29（インデックス27と28）を20コスに移動するための調整
            const rearrangedImageNames = [
                ...imageNames.slice(0, 27), // 1～27番目（そのまま）
                imageNames[27],  // ザハロワ（28番目）を20コスに追加
                imageNames[28],  // ダークスター（29番目）を20コスに追加
                ...imageNames.slice(29) // 30番目以降（そのまま）
            ];

            // アイテムを生成
            createItems(rearrangedImageNames, itemContainer, costs, costRanges);

            // 抽選ボタンの処理
            document.getElementById("drawButton").addEventListener("click", function () {
                const selectedItems = document.querySelectorAll(".item.selected");
                if (selectedItems.length === 0) {
                    alert("選択したアイテムがありません！");
                    return;
                }

                // 選ばれたアイテムのインデックスを取得
                const selectedIndexes = Array.from(selectedItems).map(item => parseInt(item.querySelector("img").dataset.index));
                
                // 4つランダムに選択
                const randomResults = getRandomElements(selectedIndexes, 4);

                // 結果を画像として表示
                const resultContainer = document.getElementById("resultContainer");
                resultContainer.innerHTML = ""; // 既存の結果をクリア

                randomResults.forEach(resultIndex => {
                    const resultDiv = document.createElement("div");
                    resultDiv.classList.add("result-item");

                    const resultImage = document.createElement("img");
                    resultImage.src = `images/item${resultIndex}.png`;  // 結果の画像
                    resultImage.alt = `アイテム${resultIndex}`;
                    resultDiv.appendChild(resultImage);

                    // 結果の名前と覚醒ランクも表示
                    const resultName = document.createElement("div");
                    resultName.classList.add("result-name");
                    resultName.textContent = rearrangedImageNames[resultIndex - 1];
                    resultDiv.appendChild(resultName);

                    const ranks = ["F覚醒", "S覚醒", "M覚醒", "D覚醒", "B覚醒"];
                    const randomRank = ranks[Math.floor(Math.random() * ranks.length)];
                    const resultRank = document.createElement("div");
                    resultRank.classList.add("result-rank");
                    resultRank.textContent = randomRank;
                    resultDiv.appendChild(resultRank);

                    resultContainer.appendChild(resultDiv);
                });
            });

            // 全選択ボタンの処理
            document.getElementById("selectAllButton").addEventListener("click", function () {
                const allItems = document.querySelectorAll(".item");
                allItems.forEach(item => {
                    item.classList.add("selected");
                    const img = item.querySelector("img");
                    img.style.filter = "brightness(50%)";
                });
            });

            // 全解除ボタンの処理
            document.getElementById("deselectAllButton").addEventListener("click", function () {
                const allItems = document.querySelectorAll(".item");
                allItems.forEach(item => {
                    item.classList.remove("selected");
                    const img = item.querySelector("img");
                    img.style.filter = "brightness(100%)";
                });
            });
        };

        // アイテムを生成して並べる
        function createItems(imageNames, parentElement, costs, costRanges) {
            let groupIndex = 0;
            let itemGroup;

            let currentIndex = 0;

            costs.forEach(cost => {
                itemGroup = document.createElement("div");
                itemGroup.classList.add("item-group");

                // コストラベルを追加
                const costLabel = document.createElement("div");
                costLabel.classList.add("cost-label");
                costLabel.textContent = cost;
                itemGroup.appendChild(costLabel);

                for (let i = 0; i < costRanges[parseInt(cost)]; i++) {
                    const itemName = imageNames[currentIndex];
                    currentIndex++;

                    const itemDiv = document.createElement("div");
                    itemDiv.classList.add("item");

                    const img = document.createElement("img");
                    img.src = `images/item${currentIndex}.png`;  // 画像のパス
                    img.alt = `アイテム${currentIndex}`;
                    img.dataset.index = currentIndex;

                    img.addEventListener("click", function () {
                        itemDiv.classList.toggle("selected");
                        img.style.filter = itemDiv.classList.contains("selected") ? "brightness(50%)" : "brightness(100%)";
                    });

                    const itemNameDiv = document.createElement("div");
                    itemNameDiv.classList.add("item-name");
                    itemNameDiv.textContent = itemName;

                    itemDiv.appendChild(img);
                    itemDiv.appendChild(itemNameDiv);
                    itemGroup.appendChild(itemDiv);
                }

                parentElement.appendChild(itemGroup);
            });
        }

        // ランダムに指定数の要素を選択する関数
        function getRandomElements(arr, num) {
            const result = [];
            const copiedArray = [...arr];  // 元の配列を変更しないようにコピー

            while (result.length < num && copiedArray.length > 0) {
                const randomIndex = Math.floor(Math.random() * copiedArray.length);
                result.push(copiedArray.splice(randomIndex, 1)[0]);
            }

            return result;
        }
    </script>
</body>
</html>
