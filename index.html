<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星の翼オールランダム抽選システム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            color: white;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        h1, p {
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .item-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
        }

        .item-group .cost-label {
            font-size: 29px;
            font-weight: bold;
            margin-right: 10px;
        }

        .item {
            margin: 10px;
            text-align: center;
            cursor: pointer;
        }

        .item img {
            width: 90px;
            height: 70px;
            transition: filter 0.3s;
        }

        .item.selected img {
            filter: brightness(50%);
        }

        .item-name {
            font-size: 14px;
            margin-top: 5px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        #drawButton, .cost-draw-button {
            background-color: #4CAF50;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        #selectAllButton, #deselectAllButton {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        #resultContainer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        #resultContainer img {
            width: 150px;
            height: 100px;
        }

        .result-item {
            text-align: center;
            margin: 10px;
        }

        .result-name, .result-rank {
            margin-top: 5px;
        }

        .checkbox-container {
            text-align: center;
            margin-top: 20px;
        }

        .count-display {
            text-align: center;
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <h1>星の翼ALLランダム抽選システム</h1>
    <p>所持キャラを選択して抽選を行ってください。※覚醒は自動で選択されます</p>

    <div class="container" id="itemContainer"></div>

    <div class="button-container">
        <button id="drawButton">選択キャラから抽選</button>
    </div>

    <div class="button-container">
        <button class="cost-draw-button" data-cost="30">30コスから抽選</button>
        <button class="cost-draw-button" data-cost="25">25コスから抽選</button>
        <button class="cost-draw-button" data-cost="20">20コスから抽選</button>
        <button class="cost-draw-button" data-cost="15">15コスから抽選</button>
    </div>

    <div class="checkbox-container">
        <input type="checkbox" id="hideAwakeningCheckbox"> 覚醒を表示しない
    </div>

    <div class="button-container">
        <button id="selectAllButton" class="select-all-button">全選択</button>
        <button id="deselectAllButton" class="select-all-button">全解除</button>
    </div>

    <div id="resultContainer"></div>

    <div class="count-display">
        <p id="totalDrawButtonCount">ボタンを押した回数: 0</p>
    </div>

    <script>
        window.onload = function () {
            const currentTime = new Date().getTime();
            const savedTime = localStorage.getItem("lastUpdatedTime");
            let totalDrawButtonCount = parseInt(localStorage.getItem("totalDrawButtonCount") || "0");

            if (savedTime) {
                const timeElapsed = currentTime - savedTime;

                // 3時間（10800000ミリ秒）経過していればリセット
                if (timeElapsed > 10800000) {
                    totalDrawButtonCount = 0; // 3時間以上経過したらリセット
                    localStorage.setItem("totalDrawButtonCount", totalDrawButtonCount);
                }
            }

            // 現在時刻を保存（リセットの基準）
            localStorage.setItem("lastUpdatedTime", currentTime);

            // 初期表示
            document.getElementById("totalDrawButtonCount").textContent = `ボタンを押した回数: ${totalDrawButtonCount}`;

            // アイテムの作成
            const itemContainer = document.getElementById("itemContainer");
            const imageNames = [
                "グリフィン", "スズラン", "影", "キャヴァリー", "ラジエル", 
                "エルフィン", "シュウウ", "ヒカリ", "ケルビム", 
                "シャープ", "スカイセーバー", "シャオリン", "18号", "アンジェリス", 
                "フリード", "シグナス", "アリス", "カゼ", "アイーダ", 
                "ヴァーチェ", "セラフィム", "スコーピオン", "パラス", "ベータ", 
                "エミカ", "デュカリオン", "チンニ", "ザハロワ", "ダークスター", 
                "ローランド", "スノーウォル", "ヤミン", "カタリナ", "オーキッド"
            ];
            const costs = ["30コス", "25コス", "20コス", "15コス"];
            const costRanges = {
                30: 9, 
                25: 9, 
                20: 11, 
                15: 5
            };

            const rearrangedImageNames = [
                ...imageNames.slice(0, 27), 
                imageNames[27], 
                imageNames[28], 
                ...imageNames.slice(29)
            ];

            createItems(rearrangedImageNames, itemContainer, costs, costRanges);
            restoreSelection();

            // 抽選ボタンのクリックイベント
            document.getElementById("drawButton").addEventListener("click", function () {
                totalDrawButtonCount++;
                document.getElementById("totalDrawButtonCount").textContent = `ボタンを押した回数: ${totalDrawButtonCount}`;
                localStorage.setItem("totalDrawButtonCount", totalDrawButtonCount);
                drawRandomItems(rearrangedImageNames);
            });

            // コストごとの抽選ボタン
            const costDrawButtons = document.querySelectorAll('.cost-draw-button');
            costDrawButtons.forEach(button => {
                button.addEventListener("click", function () {
                    totalDrawButtonCount++;
                    document.getElementById("totalDrawButtonCount").textContent = `ボタンを押した回数: ${totalDrawButtonCount}`;
                    localStorage.setItem("totalDrawButtonCount", totalDrawButtonCount);
                    const cost = button.dataset.cost;
                    const filteredIndexes = getFilteredIndexes(cost);
                    drawRandomItems(rearrangedImageNames, filteredIndexes);
                });
            });

            document.getElementById("selectAllButton").addEventListener("click", function () {
                const allItems = document.querySelectorAll(".item");
                allItems.forEach(item => {
                    item.classList.add("selected");
                    const img = item.querySelector("img");
                    img.style.filter = "brightness(50%)";
                });

                saveSelection();
            });

            document.getElementById("deselectAllButton").addEventListener("click", function () {
                const allItems = document.querySelectorAll(".item");
                allItems.forEach(item => {
                    item.classList.remove("selected");
                    const img = item.querySelector("img");
                    img.style.filter = "brightness(100%)";
                });

                saveSelection();
            });
        };

        function createItems(imageNames, parentElement, costs, costRanges) {
            let groupIndex = 0;
            let itemGroup;
            let currentIndex = 0;

            costs.forEach(cost => {
                itemGroup = document.createElement("div");
                itemGroup.classList.add("item-group");

                const costLabel = document.createElement("div");
                costLabel.classList.add("cost-label");
                costLabel.textContent = cost;
                itemGroup.appendChild(costLabel);

                for (let i = 0; i < costRanges[parseInt(cost)]; i++) {
                    const itemName = imageNames[currentIndex];
                    currentIndex++;

                    const itemDiv = document.createElement("div");
                    itemDiv.classList.add("item");

                    const img = document.createElement("img");
                    img.src = `images/item${currentIndex}.png`;
                    img.alt = `アイテム${currentIndex}`;
                    img.dataset.index = currentIndex;

                    img.addEventListener("click", function () {
                        itemDiv.classList.toggle("selected");
                        img.style.filter = itemDiv.classList.contains("selected") ? "brightness(50%)" : "brightness(100%)";
                        saveSelection();
                    });

                    const itemNameDiv = document.createElement("div");
                    itemNameDiv.classList.add("item-name");
                    itemNameDiv.textContent = itemName;

                    itemDiv.appendChild(img);
                    itemDiv.appendChild(itemNameDiv);
                    itemGroup.appendChild(itemDiv);
                }

                parentElement.appendChild(itemGroup);
            });
        }

        function drawRandomItems(imageNames, filteredIndexes = []) {
            const selectedItems = document.querySelectorAll(".item.selected");
            if (selectedItems.length === 0) {
                alert("選択したアイテムがありません！");
                return;
            }

            const selectedIndexes = Array.from(selectedItems).map(item => parseInt(item.querySelector("img").dataset.index));

            // コストフィルターが設定されていれば、対象を絞る
            const finalIndexes = filteredIndexes.length > 0 ? filteredIndexes : selectedIndexes;

            const randomResults = getRandomElements(finalIndexes, 4);

            const resultContainer = document.getElementById("resultContainer");
            resultContainer.innerHTML = ""; // 結果を初期化

            randomResults.forEach(resultIndex => {
                const resultDiv = document.createElement("div");
                resultDiv.classList.add("result-item");

                const resultImage = document.createElement("img");
                resultImage.src = `images/item${resultIndex}.png`;
                resultImage.alt = `アイテム${resultIndex}`;
                resultDiv.appendChild(resultImage);

                const resultName = document.createElement("div");
                resultName.classList.add("result-name");
                resultName.textContent = imageNames[resultIndex - 1];
                resultDiv.appendChild(resultName);

                const ranks = ["F覚醒", "S覚醒", "M覚醒", "D覚醒", "B覚醒"];
                const randomRank = ranks[Math.floor(Math.random() * ranks.length)];
                const resultRank = document.createElement("div");
                resultRank.classList.add("result-rank");
                resultRank.textContent = randomRank;
                resultDiv.appendChild(resultRank);

                resultContainer.appendChild(resultDiv);
            });
        }

        function getRandomElements(arr, num) {
            const shuffled = arr.slice();
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, num);
        }

        function saveSelection() {
            const selectedItems = document.querySelectorAll(".item.selected");
            const selectedIndexes = Array.from(selectedItems).map(item => parseInt(item.querySelector("img").dataset.index));
            localStorage.setItem("selectedItems", JSON.stringify(selectedIndexes));
        }

        function restoreSelection() {
            const selectedIndexes = JSON.parse(localStorage.getItem("selectedItems") || "[]");
            selectedIndexes.forEach(index => {
                const itemDiv = document.querySelector(`img[data-index="${index}"]`).parentElement;
                itemDiv.classList.add("selected");
                itemDiv.querySelector("img").style.filter = "brightness(50%)";
            });
        }

        function getFilteredIndexes(cost) {
            const filteredIndexes = [];
            for (let i = 0; i < costRanges[parseInt(cost)]; i++) {
                filteredIndexes.push(i + 1);
            }
            return filteredIndexes;
        }
    </script>
</body>
</html>
