<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星の翼オールランダム抽選システム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            color: white;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        h1, p {
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .item-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .item-group .cost-label {
            font-size: 29px;
            font-weight: bold;
            margin-right: 10px;
        }

        .item {
            margin: 10px;
            text-align: center;
            cursor: pointer;
        }

        .item img {
            width: 90px;
            height: 70px;
            filter: brightness(50%);
            transition: filter 0.3s;
        }

        .item.selected img {
            filter: brightness(100%);
        }

        .item-name {
            font-size: 14px;
            margin-top: 5px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        #drawButton, .cost-draw-button {
            background-color: #4CAF50;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        #selectAllButton, #deselectAllButton {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        #resultContainer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        #resultContainer img {
            width: 150px;
            height: 100px;
        }

        .result-item {
            text-align: center;
            margin: 10px;
        }

        .result-name, .result-rank {
            margin-top: 5px;
        }

        .checkbox-container {
            text-align: center;
            margin-top: 20px;
        }

        .result-count {
            text-align: center;
            margin-top: 20px;
            color: white;
        }

        .count-display {
            margin-top: 20px;
            text-align: center;
            color: white;
        }

        /* レスポンシブデザイン */
        @media screen and (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .item-group {
                flex-direction: column;
                align-items: center;
            }

            .item img {
                width: 70px;
                height: 50px;
            }

            .item-name {
                font-size: 12px;
            }

            #drawButton, .cost-draw-button {
                font-size: 18px;
                padding: 12px 25px;
            }

            #selectAllButton, #deselectAllButton {
                font-size: 14px;
                padding: 8px 18px;
            }

            #resultContainer img {
                width: 120px;
                height: 80px;
            }

            .count-display p {
                font-size: 16px;
            }
        }

        @media screen and (max-width: 480px) {
            h1 {
                font-size: 20px;
            }

            #drawButton, .cost-draw-button {
                font-size: 16px;
                padding: 10px 20px;
            }

            #selectAllButton, #deselectAllButton {
                font-size: 14px;
                padding: 6px 15px;
            }

            .count-display p {
                font-size: 14px;
            }
        }

        /* ランク別の文字色 */
        .result-rank {
            margin-top: 5px;
        }

        .result-rank.F {
            color: red; /* F覚醒 -> 赤 */
        }

        .result-rank.M {
            color: orange; /* M覚醒 -> オレンジ */
        }

        .result-rank.S {
            color: blue; /* S覚醒 -> 青 */
        }

        .result-rank.B {
            color: gray; /* B覚醒 -> 灰色 */
        }

        .result-rank.D {
            color: green; /* D覚醒 -> 緑 */
        }
    </style>
</head>
<body>
    <h1>星の翼ALLランダム抽選システム</h1>
    <p>所持キャラを選択して抽選を行ってください。※覚醒は自動で選択されます</p>

    <div class="container" id="itemContainer"></div>

    <div class="button-container">
        <button id="drawButton">選択キャラから抽選</button>
    </div>

    <div class="checkbox-container">
        <input type="checkbox" id="hideAwakeningCheckbox"> 覚醒を表示しない
    </div>

    <div class="button-container">
        <button id="selectAllButton" class="select-all-button">全選択</button>
        <button id="deselectAllButton" class="select-all-button">全解除</button>
    </div>

    <div id="resultContainer"></div>

    <div class="count-display">
        <p id="totalDrawButtonCount">ボタンを押した回数: 0</p>
    </div>

    <script>
        window.onload = function () {
            const itemContainer = document.getElementById("itemContainer");

            const imageNames = [
                "グリフィン", "スズラン", "影", "キャヴァリー", "ラジエル", 
                "エルフィン", "シュウウ", "ヒカリ", "ケルビム", 
                "シャープ", "スカイセーバー", "シャオリン", "18号", "アンジェリス", 
                "フリード", "シグナス", "アリス", "カゼ", "アイーダ", 
                "ヴァーチェ", "セラフィム", "スコーピオン", "パラス", "ベータ", 
                "エミカ", "デュカリオン", "チンニ", "ザハロワ", "ダークスター", 
                "ローランド", "スノーウォル", "ヤミン", "カタリナ", "オーキッド"
            ];

            const costs = ["30コス", "25コス", "20コス", "15コス"];
            const costRanges = {
                30: 9, 
                25: 9, 
                20: 11, 
                15: 5
            };

            const rearrangedImageNames = [
                ...imageNames.slice(0, 27), 
                imageNames[27], 
                imageNames[28], 
                ...imageNames.slice(29)
            ];

            createItems(rearrangedImageNames, itemContainer, costs, costRanges);

            restoreSelection();

            let totalDrawButtonCount = getDrawButtonCount();
            document.getElementById("totalDrawButtonCount").textContent = `ボタンを押した回数: ${totalDrawButtonCount}`;

            // 抽選ボタンのクリックイベント
            document.getElementById("drawButton").addEventListener("click", function () {
                drawRandomItems(rearrangedImageNames);
                totalDrawButtonCount++;
                document.getElementById("totalDrawButtonCount").textContent = `ボタンを押した回数: ${totalDrawButtonCount}`;
                saveDrawButtonCount(totalDrawButtonCount);
            });

            // コストごとの抽選ボタン
            const costDrawButtons = document.querySelectorAll('.cost-draw-button');
            costDrawButtons.forEach(button => {
                button.addEventListener("click", function () {
                    const cost = button.dataset.cost;
                    const filteredIndexes = getFilteredIndexes(cost);
                    drawRandomItems(rearrangedImageNames, filteredIndexes);
                    totalDrawButtonCount++;
                    document.getElementById("totalDrawButtonCount").textContent = `ボタンを押した回数: ${totalDrawButtonCount}`;
                    saveDrawButtonCount(totalDrawButtonCount);
                });
            });

            document.getElementById("selectAllButton").addEventListener("click", function () {
                const allItems = document.querySelectorAll(".item");
                allItems.forEach(item => {
                    item.classList.add("selected");
                    const img = item.querySelector("img");
                    img.style.filter = "brightness(100%)";
                });

                saveSelection();
            });

            document.getElementById("deselectAllButton").addEventListener("click", function () {
                const allItems = document.querySelectorAll(".item");
                allItems.forEach(item => {
                    item.classList.remove("selected");
                    const img = item.querySelector("img");
                    img.style.filter = "brightness(50%)";
                });

                saveSelection();
            });
        };

        function createItems(imageNames, parentElement, costs, costRanges) {
            let groupIndex = 0;
            let itemGroup;

            let currentIndex = 0;

            costs.forEach(cost => {
                itemGroup = document.createElement("div");
                itemGroup.classList.add("item-group");

                const costLabel = document.createElement("div");
                costLabel.classList.add("cost-label");
                costLabel.textContent = cost;
                itemGroup.appendChild(costLabel);

                for (let i = 0; i < costRanges[parseInt(cost)]; i++) {
                    const itemName = imageNames[currentIndex];
                    currentIndex++;

                    const itemDiv = document.createElement("div");
                    itemDiv.classList.add("item");

                    const img = document.createElement("img");
                    img.src = `images/item${currentIndex}.png`;
                    img.alt = `アイテム${currentIndex}`;
                    img.dataset.index = currentIndex;

                    img.addEventListener("click", function () {
                        itemDiv.classList.toggle("selected");
                        img.style.filter = itemDiv.classList.contains("selected") ? "brightness(100%)" : "brightness(50%)";

                        saveSelection();
                    });

                    const itemNameDiv = document.createElement("div");
                    itemNameDiv.classList.add("item-name");
                    itemNameDiv.textContent = itemName;

                    itemDiv.appendChild(img);
                    itemDiv.appendChild(itemNameDiv);
                    itemGroup.appendChild(itemDiv);
                }

                parentElement.appendChild(itemGroup);
            });
        }

        function drawRandomItems(imageNames, filteredIndexes = []) {
            const selectedItems = document.querySelectorAll(".item.selected");
            if (selectedItems.length === 0) {
                alert("選択したアイテムがありません！");
                return;
            }

            const selectedIndexes = Array.from(selectedItems).map(item => parseInt(item.querySelector("img").dataset.index));

            // コストフィルターが設定されていれば、対象を絞る
            const finalIndexes = filteredIndexes.length > 0 ? filteredIndexes : selectedIndexes;

            const randomResults = getRandomElements(finalIndexes, 4);

            const resultContainer = document.getElementById("resultContainer");
            resultContainer.innerHTML = ""; // 結果を初期化

            randomResults.forEach(resultIndex => {
                const resultDiv = document.createElement("div");
                resultDiv.classList.add("result-item");

                const resultImage = document.createElement("img");
                resultImage.src = `images/item${resultIndex}.png`;
                resultImage.alt = `アイテム${resultIndex}`;
                resultDiv.appendChild(resultImage);

                const resultName = document.createElement("div");
                resultName.classList.add("result-name");
                resultName.textContent = imageNames[resultIndex - 1];
                resultDiv.appendChild(resultName);

                const ranks = ["F", "S", "M", "D", "B"];
                const randomRank = ranks[Math.floor(Math.random() * ranks.length)];

                const resultRank = document.createElement("div");
                resultRank.classList.add("result-rank", randomRank); // ランクに対応するクラスを追加
                resultRank.textContent = `${randomRank}覚醒`;
                resultDiv.appendChild(resultRank);

                resultContainer.appendChild(resultDiv);
            });
        }

        function getRandomElements(array, count) {
            const shuffled = array.slice();
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        function getFilteredIndexes(cost) {
            const costRanges = {
                30: [0, 1, 2, 3, 4, 5, 6, 7, 8],
                25: [9, 10, 11, 12, 13, 14, 15, 16, 17],
                20: [18, 19, 20, 21, 22, 23, 24, 25, 26],
                15: [27, 28, 29, 30, 31]
            };

            return costRanges[cost];
        }

        function saveSelection() {
            const selectedIndexes = [];
            const selectedItems = document.querySelectorAll(".item.selected");

            selectedItems.forEach(item => {
                selectedIndexes.push(parseInt(item.querySelector("img").dataset.index));
            });

            localStorage.setItem("selectedIndexes", JSON.stringify(selectedIndexes));
        }

        function restoreSelection() {
            const selectedIndexes = JSON.parse(localStorage.getItem("selectedIndexes")) || [];

            const allItems = document.querySelectorAll(".item");
            allItems.forEach(item => {
                const index = parseInt(item.querySelector("img").dataset.index);
                if (selectedIndexes.includes(index)) {
                    item.classList.add("selected");
                    item.querySelector("img").style.filter = "brightness(100%)";
                }
            });
        }

        function getDrawButtonCount() {
            return parseInt(localStorage.getItem("drawButtonCount")) || 0;
        }

        function saveDrawButtonCount(count) {
            localStorage.setItem("drawButtonCount", count);
        }
    </script>
</body>
</html>
